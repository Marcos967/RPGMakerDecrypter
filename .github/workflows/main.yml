name: Build .NET CLI for Termux
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: dotnet publish RPGMakerDecrypter.CLI/RPGMakerDecrypter.CLI.csproj -c Release -r linux-arm64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpg-decrypter-dotnet
          path: RPGMakerDecrypter.CLI/bin/Release/net8.0/linux-arm64/publish/RPGMakerDecrypter.CLI
