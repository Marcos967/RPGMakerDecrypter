name: Build para Termux ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-termux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Compilar no container Termux
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace termux/termux-docker:aarch64 /bin/sh -c "
            pkg update && pkg upgrade -y
            pkg install -y build-essential cmake git
            cmake . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
          "

      - name: Upload do Binário
        uses: actions/upload-artifact@v4
        with:
          name: RPGMakerDecrypter-Termux-ARM64
          path: build/RPGMakerDecrypter-cli
